[pytest]
testpaths = tests
addopts =
    --alluredir=reports/allure-results
    -v
    --tb=short

markers =
    smoke: Smoke tests - critical happy path
    regression: Full regression suite
    critical: Business-critical tests
    web: Playwright mobile web tests
    android: Appium Android native tests
    ios: Appium iOS native tests
    mobile: Any mobile test (web or native)
    mobile_web: Playwright mobile-web emulation tests
    mobile_native: Appium native app tests

# Parallel execution: override with -n auto or -n <N>
# addopts = -n auto  # uncomment for parallel runs

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
