services:
  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: patient-portal-db-prod
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: Standard
    ports:
      - "1433:1433"
    volumes:
      - mssql_data_prod:/var/opt/mssql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - patient-portal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Patient Portal API - Production
  api:
    image: patient-portal-api:latest
    container_name: patient-portal-api-prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_HTTPS_PORT: 8443
      ConnectionStrings__DefaultConnection: "Server=mssql;Database=PatientPortalDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      AuthSettings__Issuer: "PatientPortal"
      AuthSettings__Audience: "PatientPortalUsers"
      AuthSettings__SigningKey: "${JWT_SIGNING_KEY}"
      AuthSettings__AccessTokenExpirationMinutes: "60"
      AuthSettings__RefreshTokenExpirationDays: "30"
      Logging__LogLevel__Default: "Warning"
      Logging__LogLevel__Microsoft: "Error"
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - patient-portal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mssql_data_prod:
    driver: local

networks:
  patient-portal-network:
    driver: bridge
