services:
  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: patient-portal-db-dev
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Password@123}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data_dev:/var/opt/mssql
    networks:
      - patient-portal-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD:-Password@123}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Patient Portal API - Development
  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    container_name: patient-portal-api-dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_HTTPS_PORT: 8443
      ConnectionStrings__DefaultConnection: "Server=mssql;Database=PatientPortalDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Password@123};TrustServerCertificate=True;"
      AuthSettings__Issuer: "PatientPortal"
      AuthSettings__Audience: "PatientPortalUsers"
      AuthSettings__SigningKey: "SuperSecretSigningKeyChangeMe123"
      AuthSettings__AccessTokenExpirationMinutes: "60"
      AuthSettings__RefreshTokenExpirationDays: "30"
      Logging__LogLevel__Default: "Information"
      Logging__LogLevel__Microsoft: "Warning"
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/obj
      - /app/bin
    networks:
      - patient-portal-network
    command: dotnet watch run --project PatientPortal.Api --urls http://+:8080

volumes:
  mssql_data_dev:
    driver: local

networks:
  patient-portal-network:
    driver: bridge
